info:
  name: Profit & Loss
  type: http
  seq: 1

http:
  method: GET
  url: "{{INVESTMENT_TRACKER_SERVICE}}/portfolio/user/:email/profit-and-loss?financialYear=2025-2026"
  params:
    - name: financialYear
      value: 2025-2026
      type: query
    - name: email
      value: "{{EMAIL}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
