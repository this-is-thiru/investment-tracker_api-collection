info:
  name: Get Stock Quantity
  type: http
  seq: 1

http:
  method: GET
  url: "{{INVESTMENT_TRACKER_SERVICE}}/portfolio/user/:email/stock/:stockCode/all"
  params:
    - name: email
      value: "{{EMAIL}}"
      type: path
    - name: stockCode
      value: FCL
      type: path
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
