info:
  name: Clear User Records
  type: http
  seq: 12

http:
  method: POST
  url: "{{INVESTMENT_TRACKER_SERVICE}}/portfolio/user/:email/clear/all"
  params:
    - name: email
      value: "{{EMAIL}}"
      type: path
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
