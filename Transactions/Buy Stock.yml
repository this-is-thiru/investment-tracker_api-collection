info:
  name: Buy Stock
  type: http
  seq: 1

http:
  method: POST
  url: "{{INVESTMENT_TRACKER_SERVICE}}/portfolio/user/:email/transaction"
  params:
    - name: email
      value: "{{EMAIL}}"
      type: path
  body:
    type: json
    data: "{\r

      \  \"stockCode\": \"A\",\r

      \  \"stockName\": \"ADummy\",\r

      \  \"exchangeName\": \"NSE\",\r

      \  \"brokerName\": \"ZERODHA\",\r

      \  \"price\": 100,\r

      \  \"quantity\": 10,\r

      \  \"assetType\": \"EQUITY\",\r

      \  \"actorName\": \"Thiru\",\r

      \  \"transactionType\": \"BUY\",\r

      \  \"transactionDate\": \"2025-11-10\",\r

